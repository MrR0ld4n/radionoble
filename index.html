<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Noble - Solicitar Canción</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
    
    body { 
      background-color: #0d0d0d; 
      color: #fff; 
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
      position: relative;
    }

    /* 🌈 WIDGET FLOTANTE CON TU NUEVO DEGRADADO EN EL BORDE */
    .widget-sonando {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #141414;
      background: linear-gradient(#141414, #141414) padding-box,
                  linear-gradient(135deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424) border-box;
      border: 1.5px solid transparent;
      border-radius: 14px;
      padding: 12px 20px;
      display: none; /* Oculto inicialmente en la pantalla de Login */
      align-items: center;
      gap: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      z-index: 100;
      max-width: 320px;
    }

    /* 💿 DISCO GIRATORIO INTELIGENTE (ICONO O PORTADA) */
    .widget-sonando .icon-disc {
      width: 42px;
      height: 42px;
      background-color: #222;
      background-size: cover;
      background-position: center;
      border: 2px dashed #fcd303;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 4s linear infinite;
      flex-shrink: 0;
      transition: border-style 0.3s ease;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* 🌈 TARJETA CON EL NUEVO DEGRADADO CROMÁTICO */
    .contenedor-premium {
      background: linear-gradient(#141414, #141414) padding-box,
                  linear-gradient(135deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424) border-box;
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 40px 35px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }

    /* 🛡️ REGLAS DE CONTROL PARA QUE TU LOGO PNG NO DESCONFIGURE LA TARJETA */
    .logo-noble-img {
      display: block;
      max-height: 75px; /* Controla la altura máxima automáticamente */
      width: auto;      /* Mantiene la proporción original de tu archivo */
      margin: 0 auto 15px auto; /* Lo centra y le da una separación elegante con el título */
    }

    .title-app {
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 💼 CONTENEDOR DE LOGIN SOBRIO PROFESIONAL */
    .wrapper-login-degradado {
      background: linear-gradient(rgba(10, 10, 10, 0.88), rgba(10, 10, 10, 0.88)) padding-box,
                  linear-gradient(135deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424) border-box;
      border: 1px solid transparent;
      padding: 35px 25px;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* 🔥 BOTÓN ESTILO LIQUID GLASS RESALTA DE FORMA PREMIUM */
    .btn-liquid-glass {
      background: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.22) !important;
      color: #ffffff !important;
      font-weight: 600;
      height: 54px;
      border-radius: 27px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }
    .btn-liquid-glass:hover {
      background: rgba(255, 255, 255, 0.18) !important;
      border-color: rgba(255, 255, 255, 0.4) !important;
      transform: translateY(-2px);
    }

    .box-user-profile {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .avatar-google {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #307ebf;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .label { color: #8c8c8c !important; font-size: 0.85rem !important; font-weight: 600 !important; margin-bottom: 0.3em !important; }
    .input, .select select { 
      background-color: #1a1a1a !important; 
      color: #fff !important; 
      border: 1px solid #2a2a2a !important; 
      border-radius: 8px !important;
      height: 44px;
    }
    .input:focus, .select select:focus { border-color: #444 !important; box-shadow: none !important; }
    .input::placeholder { color: #444; }
    .control.has-icons-left .icon { color: #555 !important; height: 44px; }

    /* 🌈 BOTÓN ENVIAR CON EL DEGRADADO DE TU RUEDA DE COLOR */
    .btn-degradado {
      background: linear-gradient(90deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424);
      border: none;
      color: #fff;
      font-weight: 600;
      height: 50px;
      border-radius: 25px;
      transition: transform 0.2s;
    }
    .btn-degradado:hover { color: #fff; transform: scale(1.02); }
  </style>
</head>
<body>

  <!-- WIDGET FLOTANTE SUPERIOR (ESCUCHA EN TIEMPO REAL) -->
  <div class="widget-sonando" id="recuadroWidgetFlotante">
    <div class="icon-disc" id="imgDiscoCover">
      <i class="fa-solid fa-compact-disc" id="fallbackDiscoIcon" style="color: #fcd303; font-size: 1.2rem;"></i>
    </div>
    <div style="overflow: hidden;">
      <p style="font-size: 0.65rem; color: #fcd303; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin: 0;">Sonando Ahora</p>
      <p id="widget-titulo-cancion" style="font-size: 0.85rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Esperando...</p>
      <p style="font-size: 0.7rem; color: #666; margin: 0;">Radio Noble</p>
    </div>
  </div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="contenedor-premium">
    
    <!-- ENCABEZADO: AQUÍ ESTÁ EL LOGO POSICIONADO JUSTO ARRIBA DE RADIO NOBLE -->
    <div class="has-text-centered mb-5">
      <!-- Carga el archivo logo.png de tu carpeta raíz. Si no existe, se auto-oculta limpiamente -->
      <img src="logo.png" alt="Radio Noble" class="logo-noble-img" onerror="this.style.display='none'">
      <h1 class="title is-4 title-app has-text-white mb-1">Radio Noble</h1>
      <p class="is-size-7" style="color: #666;">Sintonizando directo en los parlantes de la sede</p>
    </div>

    <!-- PANTALLA 1: LOGIN REQUERIDO (SOBRIO CORPORATIVO) -->
    <div id="div-login" class="wrapper-login-degradado">
      <p class="is-size-6 mb-5 has-text-centered has-text-weight-semibold" style="color: #e0e0e0; letter-spacing: 0.5px;">Autenticación Corporativa</p>
      <button class="button is-fullwidth btn-liquid-glass" onclick="loginConGoogle()">
        <span class="icon"><i class="fab fa-google"></i></span>
        <span>Ingresar con Google</span>
      </button>
    </div>

    <!-- PANTALLA 2: FORMULARIO ACTIVO TRAS LOGUEARSE -->
    <div id="div-formulario" style="display: none;">
      
      <!-- CUADRO DE PERFIL LOGUEADO -->
      <div class="box-user-profile">
        <div class="avatar-google" id="user-avatar-letra">U</div>
        <div style="line-height: 1.2;">
          <p id="lbl-nombre-user" style="font-size: 0.85rem; font-weight: 600; text-transform: lowercase;">usuario</p>
          <p id="lbl-correo-user" style="font-size: 0.7rem; color: #555;">correo@empresa.com</p>
        </div>
        <div class="ml-auto has-text-right">
          <span class="tag is-dark" id="lbl-cuota-user" style="border: 1px solid #333; color: #fcd303; font-weight: 600;">20 / 20</span>
        </div>
      </div>

      <!-- CAMPOS INDEPENDIENTES DE SEDE -->
      <form id="formPeticion" onsubmit="enviarPeticion(event)">
        <div class="field mb-4">
          <label class="label">Sede Asignada</label>
          <div class="control has-icons-left">
            <div class="select is-fullwidth">
              <select id="selectSede" onchange="cambiarSedeEscuchaWidget()">
                <option value="Valentía (Frontino)">Valentía (Frontino)</option>
                <option value="Unión Noble (Central)">Unión Noble (Central)</option>
                <option value="Convicción (MVPS)">Convicción (MVPS)</option>
                <option value="Confianza (Fresno)">Confianza (Fresno)</option>
                <option value="Corazon Noble (Guayabal)">Corazon Noble (Guayabal)</option>
                <option value="Cortesía (San Pedro)">Cortesía (San Pedro)</option>
                <option value="Evolución (Promisión)">Evolución (Promisión)</option>
                <option value="Familia (Hato)">Familia (Hato)</option>
                <option value="Fortaleza (Girardota)">Fortaleza (Girardota)</option>
                <option value="Lealtad (Platino)">Lealtad (Platino)</option>
                <option value="Perseverancia (Ciudadela)">Perseverancia (Ciudadela)</option>
                <option value="Propósito (La Victoria)">Propósito (La Victoria)</option>
                <option value="Resiliencia (Manizales)">Resiliencia (Manizales)</option>
                <option value="Transformación (Delta)">Transformación (Delta)</option>
              </select>
            </div>
            <div class="icon is-small is-left">
              <i class="fa-solid fa-building"></i>
            </div>
          </div>
        </div>

        <div class="field mb-4">
          <label class="label">Consecutivo de Puesto *</label>
          <div class="control has-icons-left">
            <input class="input" type="text" id="txtPuesto" placeholder="Ej: B-12 o Modulo 4" required>
            <div class="icon is-small is-left">
              <i class="fa-solid fa-desktop"></i>
            </div>
          </div>
        </div>

        <div class="field mb-4">
          <label class="label">Nombre del Artista / Grupo *</label>
          <div class="control has-icons-left">
            <input class="input" type="text" id="txtArtista" placeholder="Ej: Feid, Carin Leon" required>
            <div class="icon is-small is-left">
              <i class="fa-solid fa-users"></i>
            </div>
          </div>
        </div>

        <div class="field mb-5">
          <label class="label">Título de la Canción *</label>
          <div class="control has-icons-left">
            <input class="input" type="text" id="txtCancion" placeholder="Ej: Luna" required>
            <div class="icon is-small is-left">
              <i class="fa-solid fa-music"></i>
            </div>
          </div>
        </div>

        <button class="button is-fullwidth btn-degradado" id="btnEnviar" type="submit">
          <span class="icon"><i class="fa-solid fa-paper-plane"></i></span>
          <span>Enviar mi Canción</span>
        </button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDbFvZMgoIvN_1Hp_7l-WJ4dLvWI0GQi_I",
      authDomain: "radionoble-a040c.firebaseapp.com",
      databaseURL: "https://radionoble-a040c-default-rtdb.firebaseio.com",
      projectId: "radionoble-a040c",
      storageBucket: "radionoble-a040c.firebasestorage.app",
      messagingSenderId: "541307166879",
      appId: "1:541307166879:web:34475c1d77f849e7afc2aa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    var usuarioActual = null;
    var solicitudesHoy = 0;
    var maxPermitidas = 20;
    var estaBaneado = false;
    var refEscuchaWidget = null;

    auth.onAuthStateChanged(user => {
      if (user) {
        usuarioActual = user;
        document.getElementById("div-login").style.display = "none";
        document.getElementById("div-formulario").style.display = "block";
        document.getElementById("recuadroWidgetFlotante").style.display = "flex"; 

        var nombreLimpio = user.displayName ? user.displayName.toLowerCase() : user.email.split('@')[0];
        document.getElementById("lbl-nombre-user").innerText = nombreLimpio;
        document.getElementById("lbl-correo-user").innerText = user.email;
        document.getElementById("user-avatar-letra").innerText = nombreLimpio.charAt(0).toUpperCase();

        escucharCuotasYEstado();
        cambiarSedeEscuchaWidget();
      } else {
        document.getElementById("div-login").style.display = "block";
        document.getElementById("div-formulario").style.display = "none";
        document.getElementById("recuadroWidgetFlotante").style.display = "none"; 
      }
    });

    function loginConGoogle() {
      var provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(e => alert("Error de ingreso: " + e.message));
    }

    function escucharCuotasYEstado() {
      var uidLimpio = usuarioActual.uid;
      var fechaHoy = new Date().toISOString().slice(0, 10);

      db.ref("usuarios/" + uidLimpio).on("value", snapshot => {
        var data = snapshot.val();
        estaBaneado = data && data.baneado ? true : false;
        
        var conteo = (data && data.fechas && data.fechas[fechaHoy]) ? data.fechas[fechaHoy] : 0;
        var ajustes = (data && data.ajustes_cuota) ? data.ajustes_cuota : 0;
        
        solicitudesHoy = conteo;
        maxPermitidas = 20 + ajustes;
        if(maxPermitidas < 0) maxPermitidas = 0;

        var disponibles = maxPermitidas - solicitudesHoy;
        if(disponibles < 0) disponibles = 0;

        document.getElementById("lbl-cuota-user").innerText = disponibles + " disp.";
        if(estaBaneado) {
          document.getElementById("lbl-cuota-user").className = "tag is-danger";
          document.getElementById("lbl-cuota-user").innerText = "⛔ BANEADO";
        }
      });
    }

    function cambiarSedeEscuchaWidget() {
      var sede = document.getElementById("selectSede").value;
      var ramaSede = sede.replace(/[^a-zA-Z0-9]/g, "");

      if (refEscuchaWidget) refEscuchaWidget.off();

      refEscuchaWidget = db.ref("colas/" + ramaSede);
      refEscuchaWidget.on("value", snapshot => {
        var data = snapshot.val();
        var tituloDetectado = "Esperando...";
        var idVideoDetectado = null;
        
        if (data) {
          Object.values(data).forEach(item => {
            if (item.estado === "Sonando") {
              tituloDetectado = item.titulo;
              idVideoDetectado = item.id;
            }
          });
        }
        
        document.getElementById("widget-titulo-cancion").innerText = tituloDetectado;
        
        var discElement = document.getElementById("imgDiscoCover");
        var iconElement = document.getElementById("fallbackDiscoIcon");
        
        if(idVideoDetectado) {
          discElement.style.backgroundImage = "url('https://img.youtube.com/vi/" + idVideoDetectado + "/mqdefault.jpg')";
          discElement.style.borderStyle = "solid";
          iconElement.style.display = "none";
        } else {
          discElement.style.backgroundImage = "none";
          discElement.style.borderStyle = "dashed";
          iconElement.style.display = "block";
        }
      });
    }

    function buscarIdEnYouTube(track) {
      return new Promise((resolve) => {
        var query = track + " lyrics";
        var cbName = "ytClient_" + Math.floor(Math.random() * 100000);
        window[cbName] = function(data) {
          document.getElementById(cbName).remove();
          delete window[cbName];
          if (data && data[1] && data[1][0]) {
            var urlProxy = "https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=none&url=" + encodeURIComponent("https://www.youtube.com/results?search_query=" + encodeURIComponent(data[1][0]));
            fetch(urlProxy).then(r => r.text()).then(html => {
              var match = html.match(/\/vi\/([a-zA-Z0-9_-]{11})\//);
              resolve(match ? match[1] : "kJQP7kiw5Fk");
            }).catch(() => resolve("kJQP7kiw5Fk"));
          } else { resolve("kJQP7kiw5Fk"); }
        };
        var script = document.createElement('script');
        script.id = cbName;
        script.src = "https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=" + encodeURIComponent(query) + "&callback=" + cbName;
        document.body.appendChild(script);
      });
    }

    async function enviarPeticion(event) {
      event.preventDefault();
      if(estaBaneado) return alert("Tu usuario se encuentra suspendido de la radio.");
      if(solicitudesHoy >= maxPermitidas) return alert("Has agotado tus 20 canciones permitidas para hoy.");

      var btn = document.getElementById("btnEnviar");
      btn.classList.add("is-loading");

      var sede = document.getElementById("selectSede").value;
      var puesto = document.getElementById("txtPuesto").value.trim();
      var artista = document.getElementById("txtArtista").value.trim();
      var cancion = document.getElementById("txtCancion").value.trim();
      var tituloCompleto = artista + " - " + cancion;

      var videoId = await buscarIdEnYouTube(tituloCompleto);
      var ramaSede = sede.replace(/[^a-zA-Z0-9]/g, "");
      var fechaHoy = new Date().toISOString().slice(0, 10);
      var nombreMostrar = usuarioActual.displayName ? usuarioActual.displayName : usuarioActual.email.split('@')[0];

      db.ref("colas/" + ramaSede).push({
        usuario: nombreMostrar + " (" + puesto + ")",
        correo: usuarioActual.email,
        uid: usuarioActual.uid,
        titulo: tituloCompleto,
        artista: artista,
        id: videoId,
        hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        estado: "En espera"
      }, function(error) {
        btn.classList.remove("is-loading");
        if (error) {
          alert("Error de conexión al servidor.");
        } else {
          db.ref("usuarios/" + usuarioActual.uid + "/fechas/" + fechaHoy).set(solicitudesHoy + 1);
          db.ref("usuarios/" + usuarioActual.uid + "/nombre").set(nombreMostrar);
          db.ref("usuarios/" + usuarioActual.uid + "/correo").set(usuarioActual.email);
          db.ref("artistas_del_dia/" + ramaSede + "/" + artista.toLowerCase().replace(/[^a-z0-9]/g, "")).set(artista);
          
          alert("¡Tema enviado con éxito a la cola de la sede!");
          document.getElementById("txtCancion").value = "";
          document.getElementById("txtArtista").value = "";
        }
      });
    }
  </script>
</body>
</html>
