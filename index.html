<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Noble - Solicitar Canción</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
    body { background-color: #0d0d0d; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;}
    .borde-cromatico { background: linear-gradient(#141414, #141414) padding-box, linear-gradient(135deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424) border-box; border: 2px solid transparent; }
    .contenedor-premium { border-radius: 20px; padding: 40px 35px; max-width: 500px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
    .logo-noble-img { display: block; max-height: 75px; width: auto; margin: 0 auto 15px auto; }
    .title-app { font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    .wrapper-login-degradado { background: linear-gradient(rgba(10, 10, 10, 0.88), rgba(10, 10, 10, 0.88)) padding-box, linear-gradient(135deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424) border-box; border: 1px solid transparent; padding: 35px 25px; border-radius: 16px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .btn-liquid-glass, .select-liquid-glass select { background: rgba(255, 255, 255, 0.06) !important; backdrop-filter: blur(12px) saturate(160%); border: 1px solid rgba(255, 255, 255, 0.18) !important; color: #ffffff !important; font-weight: 600; border-radius: 27px; transition: all 0.3s ease; }
    .select-liquid-glass select { height: 48px; border-radius: 10px !important; }
    .select-liquid-glass select option { background-color: #141414; color: #fff; }
    .box-user-profile { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
    .avatar-google-real { width: 36px; height: 36px; border-radius: 50%; background-size: cover; background-position: center; background-color: #307ebf; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; border: 1px solid #444; }
    .label { color: #8c8c8c !important; font-size: 0.85rem !important; font-weight: 600 !important; }
    .input { background-color: #1a1a1a !important; color: #fff !important; border: 1px solid #2a2a2a !important; border-radius: 8px !important; height: 44px; }
    .btn-degradado { background: linear-gradient(90deg, #fcd303, #47b85d, #307ebf, #683bb5, #b82375, #d12828, #f27424); border: none; color: #fff; font-weight: 600; height: 50px; border-radius: 25px; transition: transform 0.2s; }
  </style>
</head>
<body>

  <div class="contenedor-premium borde-cromatico">
    <div class="has-text-centered mb-5">
      <h1 class="title is-4 title-app has-text-white mb-1">Radio Noble</h1>
      <p class="is-size-7" style="color: #666;">Sintonizando directo en los parlantes corporativos</p>
    </div>

    <!-- LOGIN -->
    <div id="pantalla-login" class="wrapper-login-degradado">
      <button class="button is-fullwidth btn-liquid-glass" style="height: 54px;" onclick="loginConGoogle()">
        <span class="icon"><i class="fab fa-google"></i></span><span>Ingresar con Google</span>
      </button>
    </div>

    <!-- SEDE -->
    <div id="pantalla-registro-sede" style="display: none;">
      <div class="wrapper-login-degradado">
        <div class="field mb-5">
          <label class="label">Asigna tu Sede Permanente *</label>
          <div class="control">
            <div class="select is-fullwidth select-liquid-glass">
              <select id="regSede">
                <option value="Valentía (Frontino)">Valentía (Frontino)</option>
                <option value="Unión Noble (Central)">Unión Noble (Central)</option>
                <option value="Convicción (MVPS)">Convicción (MVPS)</option>
                <option value="Confianza (Fresno)">Confianza (Fresno)</option>
                <option value="Corazon Noble (Guayabal)">Corazon Noble (Guayabal)</option>
                <option value="Cortesía (San Pedro)">Cortesía (San Pedro)</option>
                <option value="Evolución (Promisión)">Evolución (Promisión)</option>
                <option value="Familia (Hato)">Familia (Hato)</option>
                <option value="Fortaleza (Girardota)">Fortaleza (Girardota)</option>
                <option value="Lealtad (Platino)">Lealtad (Platino)</option>
                <option value="Perseverancia (Ciudadela)">Perseverancia (Ciudadela)</option>
                <option value="Propósito (La Victoria)">Propósito (La Victoria)</option>
                <option value="Resiliencia (Manizales)">Resiliencia (Manizales)</option>
                <option value="Transformación (Delta)">Transformación (Delta)</option>
              </select>
            </div>
          </div>
        </div>
        <button class="button is-fullwidth btn-degradado" onclick="guardarSedeYTerminos()">Vamos a RADIO NOBLE</button>
      </div>
    </div>

    <!-- FORMULARIO -->
    <div id="pantalla-formulario" style="display: none;">
      <div class="box-user-profile">
        <div class="avatar-google-real" id="user-avatar-letra-o-foto">U</div>
        <div style="line-height: 1.2; overflow: hidden; width: 100%;">
          <p id="lbl-nombre-user" style="font-size: 0.85rem; font-weight: 600;">usuario</p>
          <p style="font-size: 0.7rem; color: #666;"><span id="lbl-sede-fija" class="has-text-warning">Sede</span> | <span id="lbl-correo-user">correo</span></p>
        </div>
        <div class="ml-auto"><span class="tag is-dark" id="lbl-cuota-user" style="color: #fcd303;">20 disp.</span></div>
      </div>

      <form id="formPeticion" onsubmit="enviarPeticion(event)">
        <div class="field mb-4"><label class="label">Consecutivo de Puesto *</label><input class="input" type="text" id="txtPuesto" placeholder="Ej: B-12" required></div>
        <div class="field mb-4"><label class="label">Nombre del Artista / Grupo *</label><input class="input" type="text" id="txtArtista" placeholder="Ej: Bleesd" required></div>
        <div class="field mb-5"><label class="label">Título de la Canción *</label><input class="input" type="text" id="txtCancion" placeholder="Ej: Aceite de coco" required></div>
        <button class="button is-fullwidth btn-degradado" id="btnEnviar" type="submit">Enviar mi Canción</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyDbFvZMgoIvN_1Hp_7l-WJ4dLvWI0GQi_I", authDomain: "radionoble-a040c.firebaseapp.com", databaseURL: "https://radionoble-a040c-default-rtdb.firebaseio.com", projectId: "radionoble-a040c" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database(); const auth = firebase.auth();
    var usuarioActual = null, solicitudesHoy = 0, maxPermitidas = 20, estaBaneado = false, sedeAsignadaFija = "";

    auth.onAuthStateChanged(user => {
      if (user) { usuarioActual = user; verificarPerfilUsuarioEnFirebase(); } 
      else { cambiarPantallaVisible("pantalla-login"); }
    });

    function loginConGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message)); }
    function verificarPerfilUsuarioEnFirebase() { db.ref("usuarios/" + usuarioActual.uid).once("value", s => { var d = s.val(); if (d && d.sedeFija) { sedeAsignadaFija = d.sedeFija; activarInterfazFormularioPrincipal(); } else { cambiarPantallaVisible("pantalla-registro-sede"); } }); }
    function cambiarPantallaVisible(id) { document.getElementById("pantalla-login").style.display = "none"; document.getElementById("pantalla-registro-sede").style.display = "none"; document.getElementById("pantalla-formulario").style.display = "none"; document.getElementById(id).style.display = "block"; }

    function guardarSedeYTerminos() {
      var s = document.getElementById("regSede").value; var n = usuarioActual.displayName || usuarioActual.email.split('@')[0];
      db.ref("usuarios/" + usuarioActual.uid).update({ nombre: n, correo: usuarioActual.email, sedeFija: s }, () => { sedeAsignadaFija = s; activarInterfazFormularioPrincipal(); });
    }

    function activarInterfazFormularioPrincipal() {
      cambiarPantallaVisible("pantalla-formulario");
      var n = usuarioActual.displayName || usuarioActual.email.split('@')[0];
      document.getElementById("lbl-nombre-user").innerText = n.toLowerCase(); document.getElementById("lbl-correo-user").innerText = usuarioActual.email; document.getElementById("lbl-sede-fija").innerText = sedeAsignadaFija;
      var box = document.getElementById("user-avatar-letra-o-foto"); if(usuarioActual.photoURL) box.style.backgroundImage = "url('" + usuarioActual.photoURL + "')"; else box.innerText = n.charAt(0).toUpperCase();
      escucharCuotasYEstado();
    }

    function escucharCuotasYEstado() {
      var f = new Date().toISOString().slice(0, 10);
      db.ref("usuarios/" + usuarioActual.uid).on("value", snapshot => {
        var d = snapshot.val(); estaBaneado = d && d.baneado ? true : false;
        solicitudesHoy = (d && d.fechas && d.fechas[f]) ? d.fechas[f] : 0;
        maxPermitidas = 20 + (d?.ajustes_cuota || 0);
        var disp = maxPermitidas - solicitudesHoy; if(disp < 0) disp = 0;
        document.getElementById("lbl-cuota-user").innerText = disp + " disp.";
      });
    }

    function enviarPeticion(event) {
      event.preventDefault(); if(estaBaneado) return alert("Usuario suspendido."); if(solicitudesHoy >= maxPermitidas) return alert("Cupo diario agotado.");
      var btn = document.getElementById("btnEnviar"); btn.classList.add("is-loading");
      var p = document.getElementById("txtPuesto").value.trim(); var a = document.getElementById("txtArtista").value.trim(); var c = document.getElementById("txtCancion").value.trim();
      var f = new Date().toISOString().slice(0, 10); var r = sedeAsignadaFija.replace(/[^a-zA-Z0-9]/g, "");

      db.ref("colas/" + r).push({
        usuario: (usuarioActual.displayName || usuarioActual.email.split('@')[0]) + " (" + p + ")", correo: usuarioActual.email, uid: usuarioActual.uid,
        titulo: a + " - " + c, artista: a, id: "PENDIENTE",
        hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
        estado: "Pendiente ID"
      }, function(err) {
        btn.classList.remove("is-loading");
        if (!err) {
          db.ref("usuarios/" + usuarioActual.uid + "/fechas/" + f).set(solicitudesHoy + 1);
          alert("¡Enviada! Sintonizando automáticamente...");
          document.getElementById("txtCancion").value = ""; document.getElementById("txtArtista").value = "";
        }
      });
    }
  </script>
</body>
</html>
